name: Deploy to k3s

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/**'

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify cluster connectivity
        run: kubectl get nodes

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for rollout to complete
        run: kubectl rollout restart deployment/hello-world-nginx && kubectl rollout status deployment/hello-world-nginx --timeout=90s

      - name: Show deployment status
        run: |
          kubectl get pods -l app=hello-world-nginx -o wide
          kubectl get svc hello-world-nginx-service

